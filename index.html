<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raja Shahnawaz Soni — MDM Practitioner & AI Data Expert</title>
  <meta name="description" content="Raja Shahnawaz Soni — 20+ years in Data Management. MDM Practitioner, AI enthusiast, photographer, and globe trotter based in Dubai."/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #05080F;
      --bg1:      #080C17;
      --bg2:      #0C1220;
      --glass:    rgba(255,255,255,0.03);
      --glassbdr: rgba(255,255,255,0.07);
      --indigo:   #6366F1;
      --indigo2:  #818CF8;
      --cyan:     #06B6D4;
      --cyan2:    #67E8F9;
      --amber:    #F59E0B;
      --rose:     #F43F5E;
      --green:    #10B981;
      --white:    #F8FAFC;
      --muted:    #94A3B8;
      --dim:      #475569;
      --sans:     'Outfit', system-ui, sans-serif;
      --serif:    'DM Serif Display', Georgia, serif;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--bg); color: var(--white); overflow-x: hidden; }
    ::selection { background: var(--indigo); color: #fff; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--indigo); border-radius: 2px; }

    /* ── Animated mesh background ── */
    .mesh-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: var(--bg);
      overflow: hidden;
    }
    .mesh-bg::before {
      content: '';
      position: absolute; inset: -50%;
      background:
        radial-gradient(ellipse 70% 50% at 20% 20%, rgba(99,102,241,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 60% 10%, rgba(245,158,11,0.05) 0%, transparent 60%);
      animation: meshShift 20s ease-in-out infinite alternate;
    }
    @keyframes meshShift {
      0%   { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(3%,2%) rotate(3deg); }
    }

    /* ── Floating orbs ── */
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(80px);
    }
    .orb1 { width: 500px; height: 500px; background: rgba(99,102,241,0.07); top: -100px; left: -100px; animation: float1 18s ease-in-out infinite; }
    .orb2 { width: 400px; height: 400px; background: rgba(6,182,212,0.06); bottom: -80px; right: -80px; animation: float2 22s ease-in-out infinite; }
    .orb3 { width: 300px; height: 300px; background: rgba(245,158,11,0.04); top: 40%; left: 60%; animation: float3 15s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(30px,-20px)} 66%{transform:translate(-20px,30px)} }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 3rem;
      background: rgba(5,8,15,0.7);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glassbdr);
      transition: padding 0.3s;
    }
    .nav-logo {
      font-family: var(--sans);
      font-size: 1rem; font-weight: 800;
      background: linear-gradient(135deg, var(--indigo2), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none; letter-spacing: -0.02em;
    }
    .nav-links { display: flex; gap: 0.2rem; list-style: none; }
    .nav-links a {
      font-size: 0.78rem; font-weight: 500;
      color: var(--muted); text-decoration: none;
      padding: 0.4rem 0.8rem; border-radius: 6px;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--white); background: var(--glass); }

    /* ── Page wrapper ── */
    .page { position: relative; z-index: 1; }

    /* ── Section commons ── */
    section { padding: 7rem 2rem; }
    .inner { max-width: 1140px; margin: 0 auto; }
    .chip {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 0.3rem 0.8rem; border-radius: 100px;
      background: rgba(99,102,241,0.12); color: var(--indigo2);
      border: 1px solid rgba(99,102,241,0.25);
      margin-bottom: 1.2rem;
    }
    .section-title {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 4.5vw, 3.5rem);
      line-height: 1.1; font-weight: 400;
      margin-bottom: 1rem;
    }
    .section-sub {
      font-size: 1.05rem; line-height: 1.85;
      color: var(--muted); max-width: 580px;
      margin-bottom: 3.5rem;
    }

    /* ── Reveal animations ── */
    .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-left { opacity: 0; transform: translateX(-32px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal-left.visible { opacity: 1; transform: translateX(0); }
    .reveal-right { opacity: 0; transform: translateX(32px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal-right.visible { opacity: 1; transform: translateX(0); }
    .delay-100 { transition-delay: 0.1s; }
    .delay-200 { transition-delay: 0.2s; }
    .delay-300 { transition-delay: 0.3s; }
    .delay-400 { transition-delay: 0.4s; }
    .delay-500 { transition-delay: 0.5s; }
    .delay-600 { transition-delay: 0.6s; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--sans); font-size: 0.85rem; font-weight: 600;
      padding: 0.75rem 1.75rem; border-radius: 8px;
      text-decoration: none; border: none; cursor: pointer;
      transition: all 0.25s; letter-spacing: 0.02em;
    }
    .btn-grad {
      background: linear-gradient(135deg, var(--indigo), var(--cyan));
      color: #fff;
      box-shadow: 0 0 24px rgba(99,102,241,0.35);
    }
    .btn-grad:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(99,102,241,0.5); }
    .btn-ghost {
      background: var(--glass); color: var(--white);
      border: 1px solid var(--glassbdr);
    }
    .btn-ghost:hover { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.08); transform: translateY(-2px); }

    /* ════════════════ HERO ════════════════ */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 5rem 2rem 3rem;
    }
    .hero-inner {
      max-width: 1140px; margin: 0 auto; width: 100%;
      display: grid; grid-template-columns: 1fr 420px; gap: 5rem; align-items: center;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.78rem; font-weight: 600;
      padding: 0.4rem 1rem; border-radius: 100px;
      background: rgba(6,182,212,0.1); color: var(--cyan2);
      border: 1px solid rgba(6,182,212,0.2);
      margin-bottom: 1.5rem;
    }
    .hero-badge::before { content: ''; width: 6px; height: 6px; background: var(--cyan); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.5)} }

    .hero-name {
      font-family: var(--serif);
      font-size: clamp(3.5rem, 7vw, 6.5rem);
      line-height: 1.0; font-weight: 400;
      margin-bottom: 1rem;
    }
    .hero-name .grad {
      background: linear-gradient(135deg, var(--indigo2) 0%, var(--cyan) 50%, var(--amber) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradShift 4s ease infinite;
    }
    @keyframes gradShift {
      0%,100%{background-position:0% 50%} 50%{background-position:100% 50%}
    }
    .hero-tagline {
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      color: var(--muted); line-height: 1.8; margin-bottom: 2.5rem; max-width: 520px;
    }
    .hero-tagline strong { color: var(--white); }
    .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 3rem; }

    .hero-stats {
      display: flex; gap: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--glassbdr);
    }
    .stat-item {}
    .stat-num {
      font-family: var(--serif);
      font-size: 2rem;
      background: linear-gradient(135deg, var(--indigo2), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block; line-height: 1;
    }
    .stat-label { font-size: 0.72rem; color: var(--muted); font-weight: 500; margin-top: 0.2rem; }

    /* Hero right — floating card stack */
    .hero-cards {
      position: relative; height: 480px;
    }
    .hcard {
      position: absolute;
      background: var(--glass);
      border: 1px solid var(--glassbdr);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      padding: 1.5rem;
      transition: transform 0.4s ease;
    }
    .hcard:hover { transform: translateY(-6px) !important; }
    .hcard1 { width: 280px; top: 0; left: 40px; animation: cardFloat1 6s ease-in-out infinite; }
    .hcard2 { width: 260px; top: 140px; left: 0; animation: cardFloat2 7s ease-in-out infinite; }
    .hcard3 { width: 270px; top: 280px; left: 70px; animation: cardFloat3 8s ease-in-out infinite; }
    @keyframes cardFloat1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes cardFloat2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }
    @keyframes cardFloat3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

    .hcard-icon { font-size: 1.8rem; margin-bottom: 0.6rem; }
    .hcard-title { font-size: 0.85rem; font-weight: 700; color: var(--white); margin-bottom: 0.3rem; }
    .hcard-sub { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
    .hcard-bar { height: 3px; border-radius: 2px; margin-top: 0.8rem; background: var(--glassbdr); overflow: hidden; }
    .hcard-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--indigo), var(--cyan)); }

    /* ════════════════ ABOUT ════════════════ */
    #about { background: var(--bg1); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
    .about-text p { font-size: 1rem; line-height: 1.9; color: var(--muted); margin-bottom: 1.3rem; }
    .about-text p strong { color: var(--white); }
    .about-quote {
      font-family: var(--serif);
      font-size: 1.35rem; font-style: italic;
      color: var(--white);
      border-left: 3px solid var(--indigo2);
      padding-left: 1.4rem;
      margin: 2rem 0;
      line-height: 1.6;
    }
    .facts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .fact-card {
      background: var(--glass);
      border: 1px solid var(--glassbdr);
      border-radius: 12px;
      padding: 1.2rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .fact-card:hover { border-color: rgba(99,102,241,0.3); background: rgba(99,102,241,0.05); }
    .fact-icon { font-size: 1.3rem; margin-bottom: 0.4rem; }
    .fact-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); margin-bottom: 0.2rem; }
    .fact-value { font-size: 0.88rem; font-weight: 600; color: var(--white); line-height: 1.4; }

    .passions-wrap { margin-top: 1.2rem; }
    .passions-wrap .fact-label { margin-bottom: 0.6rem; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tag {
      font-size: 0.75rem; font-weight: 600;
      padding: 0.3rem 0.8rem; border-radius: 100px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      transition: all 0.2s;
    }
    .tag:hover { color: var(--white); border-color: var(--indigo2); background: rgba(99,102,241,0.1); }

    /* ════════════════ EXPERTISE ════════════════ */
    #expertise { background: var(--bg); }
    .expertise-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--glassbdr); border-radius: 16px; overflow: hidden; }
    .exp-card {
      background: var(--bg1);
      padding: 2rem;
      transition: background 0.3s;
      position: relative; overflow: hidden;
    }
    .exp-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--indigo), var(--cyan));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
    }
    .exp-card:hover::before { transform: scaleX(1); }
    .exp-card:hover { background: #0E1525; }
    .exp-icon { font-size: 2rem; margin-bottom: 1rem; display: block; }
    .exp-name { font-size: 1.05rem; font-weight: 700; color: var(--white); margin-bottom: 0.6rem; }
    .exp-desc { font-size: 0.85rem; line-height: 1.7; color: var(--muted); margin-bottom: 1rem; }
    .exp-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .exp-tag {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 0.2rem 0.5rem; border-radius: 4px;
      background: rgba(99,102,241,0.1); color: var(--indigo2);
      border: 1px solid rgba(99,102,241,0.15);
    }

    /* ════════════════ TIMELINE ════════════════ */
    #timeline { background: var(--bg2); }
    .tl-wrap { position: relative; padding-left: 2rem; }
    .tl-wrap::before {
      content: '';
      position: absolute; left: 0; top: 0.5rem; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--indigo), rgba(99,102,241,0));
    }
    .tl-item { position: relative; padding-bottom: 3.5rem; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-dot {
      position: absolute; left: -2rem; top: 0.3rem;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--indigo); border: 2px solid var(--bg2);
      box-shadow: 0 0 10px rgba(99,102,241,0.6);
      transform: translateX(-5px);
    }
    .tl-period {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--indigo2); margin-bottom: 0.4rem;
    }
    .tl-role { font-family: var(--serif); font-size: 1.4rem; color: var(--white); margin-bottom: 0.3rem; }
    .tl-co { font-size: 0.85rem; font-weight: 600; color: var(--cyan); margin-bottom: 0.8rem; }
    .tl-desc { font-size: 0.9rem; line-height: 1.75; color: var(--muted); max-width: 600px; margin-bottom: 0.8rem; }
    .tl-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .tl-tag {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 0.18rem 0.5rem; border-radius: 4px;
      background: rgba(6,182,212,0.08); color: var(--cyan);
      border: 1px solid rgba(6,182,212,0.15);
    }

    /* ════════════════ PROJECTS ════════════════ */
    #projects { background: var(--bg); }
    .projects-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.5rem; }
    .proj-card {
      background: var(--glass);
      border: 1px solid var(--glassbdr);
      border-radius: 16px; padding: 2rem;
      text-decoration: none; color: inherit; display: block;
      transition: all 0.3s; position: relative; overflow: hidden;
    }
    .proj-card::after {
      content: '';
      position: absolute; inset: 0; border-radius: 16px; opacity: 0;
      background: linear-gradient(135deg, rgba(99,102,241,0.05), rgba(6,182,212,0.05));
      transition: opacity 0.3s;
    }
    .proj-card:hover { border-color: rgba(99,102,241,0.35); transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .proj-card:hover::after { opacity: 1; }
    .proj-card.feat { grid-column: span 2; background: linear-gradient(135deg, rgba(99,102,241,0.06), rgba(6,182,212,0.03)); border-color: rgba(99,102,241,0.2); }
    .proj-badge {
      display: inline-block;
      font-size: 0.62rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 0.25rem 0.7rem; border-radius: 100px;
      background: linear-gradient(135deg, var(--indigo), var(--cyan));
      color: #fff; margin-bottom: 1rem;
    }
    .proj-name { font-family: var(--serif); font-size: 1.5rem; color: var(--white); margin-bottom: 0.6rem; }
    .proj-card.feat .proj-name { font-size: 2rem; }
    .proj-desc { font-size: 0.9rem; line-height: 1.75; color: var(--muted); margin-bottom: 1.2rem; }
    .proj-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .pmeta {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem; border-radius: 4px;
      border: 1px solid var(--glassbdr); color: var(--dim);
    }
    .proj-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; font-weight: 700;
      color: var(--indigo2); margin-top: 1rem;
      text-decoration: none; transition: gap 0.2s;
    }
    .proj-link:hover { gap: 0.7rem; color: var(--cyan); }

    /* ════════════════ PHOTOGRAPHY ════════════════ */
    #photography { background: var(--bg1); }
    .photo-mosaic {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      grid-template-rows: 180px 180px;
      gap: 4px; border-radius: 16px; overflow: hidden;
      margin-bottom: 2rem;
    }
    .photo-cell { position: relative; overflow: hidden; cursor: pointer; }
    .photo-cell.wide { grid-column: span 2; }
    .photo-cell.tall { grid-row: span 2; }
    .photo-bg {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.4rem;
      background: var(--bg2);
      transition: transform 0.5s ease;
    }
    .photo-cell:hover .photo-bg { transform: scale(1.06); }
    .photo-emo { font-size: 2.2rem; }
    .photo-lbl { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
    .photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(6,182,212,0.08));
      opacity: 0; transition: opacity 0.3s;
    }
    .photo-cell:hover .photo-overlay { opacity: 1; }

    /* ════════════════ BUFFY ════════════════ */
    #buffy { background: var(--bg); border-top: 1px solid var(--glassbdr); border-bottom: 1px solid var(--glassbdr); }
    .buffy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
    .buffy-visual {
      aspect-ratio: 1; max-width: 400px;
      border-radius: 24px; overflow: hidden;
      background: radial-gradient(ellipse at center, rgba(245,158,11,0.1), transparent 70%);
      border: 1px solid rgba(245,158,11,0.15);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .buffy-emo {
      font-size: 10rem;
      animation: buffyBounce 4s ease-in-out infinite;
    }
    @keyframes buffyBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
    .buffy-glow {
      position: absolute; inset: -20%;
      background: radial-gradient(ellipse at center, rgba(245,158,11,0.08), transparent 70%);
      animation: buffyGlow 3s ease-in-out infinite alternate;
    }
    @keyframes buffyGlow { 0%{opacity:0.4} 100%{opacity:1} }
    .buffy-content .chip { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.25); }
    .buffy-content .section-title span { color: var(--amber); }
    .buffy-content p { font-size: 1rem; line-height: 1.85; color: var(--muted); margin-bottom: 1.2rem; }
    .buffy-content p strong { color: var(--white); }

    /* ════════════════ BLOG ════════════════ */
    #blog { background: var(--bg1); }
    .blog-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
    .blog-card {
      background: var(--glass); border: 1px solid var(--glassbdr);
      border-radius: 16px; padding: 1.8rem;
      text-decoration: none; color: inherit; display: block;
      transition: all 0.3s;
    }
    .blog-card:hover { border-color: rgba(16,185,129,0.35); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
    .blog-date { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--green); margin-bottom: 0.8rem; }

const { useState, useEffect, useRef } = React;

/* ── Intersection Observer hook ─────────────────────────────────────────── */
function useReveal(threshold = 0.12) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

/* ── Animated counter ───────────────────────────────────────────────────── */
function Counter({ target, suffix = "" }) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        obs.disconnect();
        let start = 0;
        const end = parseInt(target);
        const duration = 1500;
        const step = duration / end;
        const timer = setInterval(() => {
          start += 1;
          setCount(start);
          if (start >= end) clearInterval(timer);
        }, step);
      }
    }, { threshold: 0.5 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [target]);
  return <span ref={ref}>{count}{suffix}</span>;
}

              <a key={i} className={`blog-card reveal delay-${i*100}`} ref={ref} href={post.link} target="_blank" rel="noopener noreferrer">
                <div className="blog-date">{post.date}</div>
                <div className="blog-title">{post.title}</div>
                <div className="blog-excerpt">{post.excerpt}</div>
                <span className="blog-more">Read on Blog →</span>
              </a>
            );
          })}
        </div>
        <div style={{marginTop:"2.5rem"}}>
          <a className="btn btn-ghost" href="https://my-heart-thinks.blogspot.com/" target="_blank" rel="noopener noreferrer" style={{borderColor:"rgba(16,185,129,0.3)",color:"var(--green)"}}>Read All Posts →</a>
        </div>
      </div>
    </section>
  );
};
