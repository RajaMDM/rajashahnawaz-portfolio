<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raja Shahnawaz Soni — MDM Practitioner & AI-Powered Data Management</title>
  <meta name="description" content="Raja Shahnawaz Soni — MDM Practitioner, AI-Powered Data Management Enthusiast, photographer, and globe trotter based in Dubai."/>
  <meta name="author" content="Raja Shahnawaz Soni"/>
  <meta property="og:title" content="Raja Shahnawaz Soni — MDM & Data Management"/>
  <meta property="og:description" content="Global professional. Data nerd. Storyteller. Based in Dubai."/>
  <meta property="og:type" content="website"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- React 18 + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0F0F0E;
      --bg2:     #161614;
      --paper:   #F5F0E8;
      --paper2:  #EDE8DC;
      --gold:    #C9A84C;
      --gold2:   #E8C96B;
      --rose:    #D64C3F;
      --sage:    #6B8A6F;
      --smoke:   #8A8A7E;
      --white:   #FAFAF7;
      --serif:   'Playfair Display', Georgia, serif;
      --sans:    'Space Grotesk', system-ui, sans-serif;
      --body:    'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--white);
      overflow-x: hidden;
    }

    ::selection { background: var(--gold); color: var(--bg); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      backdrop-filter: blur(20px);
      background: rgba(15,15,14,0.85);
      border-bottom: 1px solid rgba(201,168,76,0.15);
      transition: all 0.3s;
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.02em;
      cursor: pointer;
      text-decoration: none;
    }
    .nav-links {
      display: flex; gap: 2rem; list-style: none;
    }
    .nav-links a {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--smoke);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }

    /* ── Hero ── */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 6rem 3rem 4rem;
      position: relative;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 40%, rgba(201,168,76,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 10% 80%, rgba(107,138,111,0.05) 0%, transparent 60%);
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .hero-label {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .hero-name {
      font-family: var(--serif);
      font-size: clamp(3.5rem, 7vw, 6rem);
      font-weight: 900;
      line-height: 1.0;
      color: var(--white);
      margin-bottom: 0.5rem;
    }
    .hero-name em {
      font-style: italic;
      color: var(--gold);
    }
    .hero-title {
      font-family: var(--serif);
      font-size: clamp(1rem, 2vw, 1.4rem);
      font-weight: 400;
      font-style: italic;
      color: var(--smoke);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .hero-bio {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(250,250,247,0.75);
      margin-bottom: 2.5rem;
      max-width: 520px;
    }
    .hero-cta {
      display: flex; gap: 1rem; flex-wrap: wrap;
    }
    .btn-primary {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.85rem 2rem;
      background: var(--gold);
      color: var(--bg);
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary:hover { background: var(--gold2); transform: translateY(-2px); }
    .btn-outline {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.85rem 2rem;
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(250,250,247,0.3);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

    .hero-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.5rem;
    }
    .hero-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(201,168,76,0.15);
    }
    .hero-stat {
      background: var(--bg2);
      padding: 1.5rem;
    }
    .hero-stat-num {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }
    .hero-stat-label {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--smoke);
      margin-top: 0.3rem;
    }
    .hero-tagline {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-style: italic;
      color: rgba(250,250,247,0.5);
      border-left: 3px solid var(--gold);
      padding-left: 1.2rem;
      line-height: 1.6;
    }

    /* ── Section commons ── */
    section {
      padding: 6rem 3rem;
    }
    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .section-label {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .section-title {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .section-subtitle {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(250,250,247,0.65);
      max-width: 640px;
      margin-bottom: 3rem;
    }

    /* ── About (light bg) ── */
    #about {
      background: var(--paper);
      color: var(--bg);
    }
    #about .section-title { color: var(--bg); }
    #about .section-label { color: var(--rose); }
    #about .section-subtitle { color: rgba(15,15,14,0.65); }
    .about-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 4rem;
      align-items: start;
    }
    .about-text p {
      font-size: 1.05rem;
      line-height: 1.9;
      color: rgba(15,15,14,0.8);
      margin-bottom: 1.4rem;
    }
    .about-text p strong { color: var(--bg); }
    .about-text blockquote {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-style: italic;
      color: var(--bg);
      border-left: 4px solid var(--rose);
      padding-left: 1.5rem;
      margin: 2rem 0;
      line-height: 1.5;
    }
    .about-sidebar {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .info-card {
      background: var(--paper2);
      border: 1px solid rgba(15,15,14,0.08);
      padding: 1.5rem;
    }
    .info-card-label {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 0.5rem;
    }
    .info-card-value {
      font-family: var(--serif);
      font-size: 1.05rem;
      color: var(--bg);
      line-height: 1.5;
    }
    .passions-list {
      display: flex; flex-wrap: wrap; gap: 0.6rem;
      margin-top: 0.8rem;
    }
    .passion-tag {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.3rem 0.8rem;
      background: var(--bg);
      color: var(--gold);
      border-radius: 2px;
    }

    /* ── Expertise ── */
    #expertise {
      background: var(--bg);
    }
    .expertise-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: rgba(201,168,76,0.12);
    }
    .expertise-card {
      background: var(--bg2);
      padding: 2rem;
      transition: background 0.2s;
    }
    .expertise-card:hover { background: #1C1C19; }
    .expertise-icon {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }
    .expertise-name {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.6rem;
    }
    .expertise-desc {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--smoke);
    }
    .expertise-tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-top: 1rem;
    }
    .etag {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.6rem;
      border: 1px solid rgba(201,168,76,0.3);
      color: rgba(201,168,76,0.7);
    }

    /* ── Timeline ── */
    #timeline {
      background: var(--bg2);
    }
    .timeline-track {
      position: relative;
      padding-left: 2.5rem;
    }
    .timeline-track::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--gold), rgba(201,168,76,0.1));
    }
    .timeline-item {
      position: relative;
      padding-bottom: 3rem;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2.5rem;
      top: 0.4rem;
      width: 10px; height: 10px;
      background: var(--gold);
      border-radius: 50%;
      transform: translateX(-4px);
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .tl-period {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }
    .tl-role {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.2rem;
    }
    .tl-company {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--sage);
      margin-bottom: 0.8rem;
    }
    .tl-desc {
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--smoke);
      max-width: 640px;
    }
    .tl-tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-top: 0.8rem;
    }
    .tl-tag {
      font-family: var(--sans);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.5rem;
      background: rgba(107,138,111,0.15);
      color: var(--sage);
      border-radius: 2px;
    }

    /* ── Projects ── */
    #projects {
      background: var(--bg);
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
    .project-card {
      background: var(--bg2);
      border: 1px solid rgba(201,168,76,0.08);
      padding: 2rem;
      transition: all 0.25s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .project-card:hover {
      border-color: rgba(201,168,76,0.35);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .project-card.featured {
      grid-column: span 2;
      background: linear-gradient(135deg, #1A1A17 0%, #161614 100%);
      border-color: rgba(201,168,76,0.2);
    }
    .project-badge {
      display: inline-block;
      font-family: var(--sans);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      background: var(--gold);
      color: var(--bg);
      margin-bottom: 1rem;
    }
    .project-name {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 0.6rem;
    }
    .project-card.featured .project-name {
      font-size: 2rem;
    }
    .project-desc {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--smoke);
      margin-bottom: 1.2rem;
    }
    .project-meta {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    .pmeta {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.6rem;
      border: 1px solid rgba(250,250,247,0.12);
      color: var(--smoke);
    }
    .project-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 1rem;
      text-decoration: none;
    }
    .project-link:hover { color: var(--gold2); }

    /* ── Photography ── */
    #photography {
      background: var(--bg2);
    }
    .photo-mosaic {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: auto;
      gap: 3px;
      margin-top: 2.5rem;
    }
    .photo-item {
      aspect-ratio: 1;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .photo-item.wide { grid-column: span 2; aspect-ratio: 2/1; }
    .photo-item.tall { grid-row: span 2; aspect-ratio: 1/2; }
    .photo-placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, rgba(201,168,76,0.05), rgba(107,138,111,0.05));
      transition: all 0.3s;
      font-size: 2rem;
    }
    .photo-item:hover .photo-placeholder {
      background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(107,138,111,0.12));
    }
    .photo-label {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--smoke);
    }
    .photo-cta {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    /* ── Buffy ── */
    #buffy {
      background: #0D0D0A;
      border-top: 1px solid rgba(201,168,76,0.1);
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .buffy-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }
    .buffy-portrait {
      aspect-ratio: 1;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.08), transparent 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10rem;
      border: 1px solid rgba(201,168,76,0.1);
    }
    .buffy-content .section-title { color: var(--gold); }
    .buffy-content p {
      font-size: 1.05rem;
      line-height: 1.85;
      color: rgba(250,250,247,0.7);
      margin-bottom: 1.2rem;
    }

    /* ── Blog ── */
    #blog {
      background: var(--paper);
      color: var(--bg);
    }
    #blog .section-title { color: var(--bg); }
    #blog .section-label { color: var(--sage); }
    #blog .section-subtitle { color: rgba(15,15,14,0.6); }
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }
    .blog-card {
      background: var(--paper2);
      border: 1px solid rgba(15,15,14,0.08);
      padding: 1.8rem;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .blog-card:hover {
      border-color: var(--sage);
      transform: translateY(-3px);
    }
    .blog-date {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 0.8rem;
    }
    .blog-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--bg);
      line-height: 1.4;
      margin-bottom: 0.8rem;
    }
    .blog-excerpt {
      font-size: 0.88rem;
      line-height: 1.7;
      color: rgba(15,15,14,0.6);
    }
    .blog-read-more {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sage);
      margin-top: 1rem;
      display: inline-block;
    }

    /* ── Contact ── */
    #contact {
      background: var(--bg);
    }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }
    .contact-left p {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(250,250,247,0.65);
      margin-bottom: 2rem;
    }
    .social-links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .social-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--smoke);
      text-decoration: none;
      padding: 0.8rem 1rem;
      border: 1px solid rgba(250,250,247,0.06);
      transition: all 0.2s;
    }
    .social-link:hover { border-color: var(--gold); color: var(--gold); }
    .social-icon { font-size: 1.1rem; width: 1.5rem; text-align: center; }
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-label {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--smoke);
    }
    .form-input, .form-textarea {
      background: var(--bg2);
      border: 1px solid rgba(250,250,247,0.1);
      color: var(--white);
      font-family: var(--body);
      font-size: 0.9rem;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border 0.2s;
      resize: vertical;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--gold);
    }
    .form-textarea { min-height: 120px; }

    /* ── Footer ── */
    footer {
      background: var(--bg2);
      border-top: 1px solid rgba(201,168,76,0.1);
      padding: 2.5rem 3rem;
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-copy {
      font-family: var(--sans);
      font-size: 0.78rem;
      color: var(--smoke);
    }
    .footer-links {
      display: flex;
      gap: 1.5rem;
    }
    .footer-links a {
      font-family: var(--sans);
      font-size: 0.75rem;
      color: var(--smoke);
      text-decoration: none;
      transition: color 0.2s;
    }

                    value={formState.message}
                    onChange={e => setFormState({...formState, message: e.target.value})}
                  />
                </div>
                <button type="submit" className="btn-primary">Send Message</button>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
};
